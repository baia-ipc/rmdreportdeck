<style>
:root {
  --report-bg: #f4f7fb;
  --report-surface: rgba(255, 255, 255, 0.92);
  --report-surface-strong: #ffffff;
  --report-surface-soft: #eef4fb;
  --report-border: #d7e2ef;
  --report-border-strong: #bfd0e4;
  --report-text: #1b2733;
  --report-text-muted: #5e7287;
  --report-heading: #10202f;
  --report-accent: #2f6fdd;
  --report-accent-strong: #1f56b7;
  --report-accent-soft: rgba(47, 111, 221, 0.12);
  --report-good: #11845b;
  --report-shadow: 0 22px 44px rgba(30, 58, 92, 0.08);
  --report-shadow-soft: 0 10px 24px rgba(30, 58, 92, 0.06);
  --report-radius-lg: 20px;
  --report-radius-md: 14px;
  --report-radius-sm: 10px;
  --report-sidebar-width: 260px;
  --report-sidebar-min-width: 220px;
  --report-sidebar-max-width: 560px;
  --report-resizer-width: 12px;
  --report-content-width: 100%;
}

html {
  scroll-behavior: smooth;
  scroll-padding-top: 7rem;
}

body {
  margin: 0;
  color: var(--report-text);
  background:
    radial-gradient(circle at top left, rgba(47, 111, 221, 0.15), transparent 28%),
    radial-gradient(circle at top right, rgba(17, 132, 91, 0.10), transparent 24%),
    linear-gradient(180deg, #f8fbff 0%, #f4f7fb 38%, #edf2f8 100%);
  font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", "Noto Sans", sans-serif;
  line-height: 1.6;
}

body.report-shell-ready {
  min-height: 100vh;
}

.report-shell {
  position: relative;
  display: block;
  width: 100%;
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  overflow-x: hidden;
}

.report-sidebar {
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  width: var(--report-sidebar-width);
  min-height: 100vh;
  max-height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
  padding: 1.5rem 1.15rem 1.25rem;
  box-sizing: border-box;
  border-right: 1px solid var(--report-border);
  background: linear-gradient(180deg, #cfdceb 0%, #c5d4e4 100%);
  color: #1d3145;
  box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.65);
  z-index: 20;
}

.report-sidebar-resizer {
  position: absolute;
  top: 0;
  left: calc(var(--report-sidebar-width) - (var(--report-resizer-width) / 2));
  bottom: 0;
  width: var(--report-resizer-width);
  cursor: col-resize;
  user-select: none;
  touch-action: none;
  background: transparent;
  z-index: 30;
}

.report-sidebar-resizer::before {
  content: "";
  position: absolute;
  top: 0;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 1px;
  background: linear-gradient(180deg, rgba(133, 157, 184, 0.18), rgba(133, 157, 184, 0.9), rgba(133, 157, 184, 0.18));
}

.report-sidebar-resizer::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 6px;
  height: 52px;
  transform: translate(-50%, -50%);
  border-radius: 999px;
  background:
    radial-gradient(circle at 50% 20%, rgba(91, 118, 146, 0.75) 0 1.5px, transparent 2px),
    radial-gradient(circle at 50% 50%, rgba(91, 118, 146, 0.75) 0 1.5px, transparent 2px),
    radial-gradient(circle at 50% 80%, rgba(91, 118, 146, 0.75) 0 1.5px, transparent 2px);
  opacity: 0.9;
}

.report-sidebar-resizer:hover::before,
.report-sidebar-resizer:focus::before,
body.report-sidebar-resizing .report-sidebar-resizer::before {
  width: 2px;
  background: linear-gradient(180deg, rgba(47, 111, 221, 0.18), rgba(47, 111, 221, 0.95), rgba(47, 111, 221, 0.18));
}

.report-sidebar-resizer:hover::after,
.report-sidebar-resizer:focus::after,
body.report-sidebar-resizing .report-sidebar-resizer::after {
  opacity: 1;
}

.report-sidebar-resizer:focus {
  outline: none;
}

.report-sidebar-brand {
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}

.report-sidebar-kicker,
.report-hero-kicker {
  display: inline-flex;
  align-items: center;
  gap: 0.45rem;
  width: fit-content;
  padding: 0.35rem 0.8rem;
  border-radius: 999px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-size: 0.72rem;
  font-weight: 700;
}

.report-sidebar-kicker {
  background: rgba(47, 111, 221, 0.11);
  color: #355677;
}

.report-sidebar-title {
  margin: 0;
  font-size: 2.325rem;
  line-height: 1.15;
  font-weight: 700;
  color: #162a3d;
}

.report-sidebar-metrics {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 0.65rem;
}

.report-metric-card {
  padding: 0.8rem 0.9rem;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.8);
  border: 1px solid rgba(168, 188, 211, 0.95);
}

.report-metric-label {
  display: block;
  font-size: 1.11rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #647d95;
}

.report-metric-value {
  display: block;
  margin-top: 0.2rem;
  font-size: 1.725rem;
  font-weight: 700;
  color: #172b3e;
}

.report-sidebar-nav-wrap {
  min-height: 0;
  overflow: auto;
  padding-right: 0.35rem;
}

.report-sidebar-nav-wrap::-webkit-scrollbar {
  width: 8px;
}

.report-sidebar-nav-wrap::-webkit-scrollbar-thumb {
  border-radius: 999px;
  background: rgba(53, 86, 119, 0.24);
}

.report-nav-title {
  margin: 0 0 0.7rem;
  font-size: 1.17rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #67809a;
}

.report-nav-list {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

.report-nav-link {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  width: 100%;
  padding: 0.58rem 0.8rem;
  border-radius: 12px;
  color: #27415b;
  text-decoration: none;
  font-size: 1.41rem;
  line-height: 1.35;
  transition: background 0.15s ease, color 0.15s ease, transform 0.15s ease;
}

.report-nav-link:hover,
.report-nav-link:focus {
  color: #17324c;
  text-decoration: none;
  background: rgba(47, 111, 221, 0.08);
  outline: none;
}

.report-nav-link.active {
  color: #102b45;
  background: linear-gradient(90deg, rgba(115, 167, 255, 0.28), rgba(115, 167, 255, 0.12));
  box-shadow: inset 0 0 0 1px rgba(148, 190, 255, 0.38);
}

.report-nav-link.level2 {
  padding-left: 1.8rem;
  font-size: 1.32rem;
  color: #56708a;
}

.report-nav-link.level3 {
  padding-left: 2.8rem;
  font-size: 1.23rem;
  color: #627b94;
}

.report-nav-link.level4 {
  padding-left: 3.8rem;
  font-size: 1.16rem;
  color: #6d859d;
}

.report-nav-index {
  min-width: 1.55rem;
  height: 1.55rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  background: rgba(47, 111, 221, 0.10);
  font-size: 1.08rem;
  font-weight: 700;
  color: inherit;
}

.report-main-column {
  box-sizing: border-box;
  min-width: 0;
  margin-left: var(--report-sidebar-width);
  max-width: calc(100vw - var(--report-sidebar-width));
  padding: 1.1rem 0.2rem 1.5rem 0.7rem;
  width: calc(100vw - var(--report-sidebar-width));
}

body.report-shell-ready .main-container {
  width: 100% !important;
  max-width: none !important;
  margin: 0 !important;
  padding: 0 !important;
}

body.report-shell-ready .main-container > #header,
body.report-shell-ready .main-container > .report-section-controls,
body.report-shell-ready .main-container > details.report-section {
  width: 100%;
}

.report-step-chip,
.report-meta-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0.45rem 0.8rem;
  border-radius: 999px;
  font-size: 0.78rem;
  line-height: 1;
  font-weight: 700;
  white-space: nowrap;
}

.report-step-chip {
  background: linear-gradient(135deg, var(--report-accent), var(--report-accent-strong));
  color: #ffffff;
  box-shadow: 0 10px 24px rgba(47, 111, 221, 0.22);
}

.report-meta-chip {
  background: var(--report-surface-soft);
  color: #37506a;
  border: 1px solid var(--report-border);
}

#header {
  margin-bottom: 1rem;
  padding: 1.5rem 1.65rem;
  border-radius: var(--report-radius-lg);
  background:
    linear-gradient(135deg, rgba(47, 111, 221, 0.08), rgba(17, 132, 91, 0.05)),
    var(--report-surface-strong);
  border: 1px solid rgba(255, 255, 255, 0.72);
  box-shadow: var(--report-shadow);
}

#header > :last-child {
  margin-bottom: 0;
}

#header .title {
  margin: 0;
  color: var(--report-heading);
  font-size: clamp(1.85rem, 3vw, 2.6rem);
  line-height: 1.05;
  font-weight: 750;
  letter-spacing: -0.03em;
}

.report-hero-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.55rem;
  margin-top: 0.95rem;
}

.report-hero-meta span {
  display: inline-flex;
  align-items: center;
  padding: 0.45rem 0.8rem;
  border-radius: 999px;
  background: var(--report-surface-soft);
  border: 1px solid var(--report-border);
  color: #37506a;
  font-size: 0.82rem;
  font-weight: 600;
}

.report-hero-meta .report-step-chip {
  background: linear-gradient(135deg, var(--report-accent), var(--report-accent-strong));
  color: #ffffff;
  border-color: transparent;
  box-shadow: 0 10px 24px rgba(47, 111, 221, 0.22);
}

.report-section-controls {
  display: flex;
  gap: 0.55rem;
  flex-wrap: wrap;
  margin: 0 0 1.2rem;
}

.report-section-controls .btn,
.report-asset-bar .btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.45rem;
  min-height: 2rem;
  padding: 0.45rem 0.85rem;
  border-radius: 999px;
  border: 1px solid var(--report-border);
  background: var(--report-surface-strong);
  color: #294869;
  box-shadow: none;
  text-decoration: none;
  transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
}

.report-section-controls .btn:hover,
.report-section-controls .btn:focus,
.report-asset-bar .btn:hover,
.report-asset-bar .btn:focus {
  transform: translateY(-1px);
  border-color: var(--report-border-strong);
  background: #f8fbff;
  box-shadow: 0 10px 18px rgba(47, 111, 221, 0.08);
  color: #1d4371;
  text-decoration: none;
  outline: none;
}

details.report-section,
details.report-subsection {
  scroll-margin-top: 7rem;
}

details.report-section {
  margin: 1.1rem 0;
  border: 1px solid rgba(255, 255, 255, 0.74);
  border-radius: var(--report-radius-lg);
  background: var(--report-surface);
  box-shadow: var(--report-shadow-soft);
  overflow: hidden;
}

details.report-section[open] {
  border-color: rgba(47, 111, 221, 0.18);
  box-shadow: var(--report-shadow);
}

details.report-section > summary {
  display: flex;
  align-items: center;
  gap: 0.9rem;
  cursor: pointer;
  list-style: none;
  padding: 1.1rem 1.25rem;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(245, 249, 255, 0.92));
}

details.report-section > summary::-webkit-details-marker,
details.report-subsection > summary::-webkit-details-marker {
  display: none;
}

details.report-section > summary::before,
details.report-subsection > summary::before {
  content: "\25B8";
  flex: 0 0 auto;
  width: 1.8rem;
  height: 1.8rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  background: var(--report-accent-soft);
  color: var(--report-accent-strong);
  font-size: 0.82rem;
  transition: transform 0.15s ease, background 0.15s ease;
}

details.report-section[open] > summary::before,
details.report-subsection[open] > summary::before {
  transform: rotate(90deg);
  background: rgba(47, 111, 221, 0.18);
}

details.report-section > summary:focus,
details.report-subsection > summary:focus {
  outline: 3px solid rgba(47, 111, 221, 0.2);
  outline-offset: -1px;
}

details.report-section > summary .report-section-title {
  font-size: clamp(1.2rem, 1.8vw, 1.6rem);
  line-height: 1.2;
  font-weight: 700;
  color: var(--report-heading);
}

details.report-section > .report-section-body {
  padding: 0 1.3rem 1.3rem;
}

details.report-section > .report-section-body > :first-child,
details.report-subsection > .report-subsection-body > :first-child {
  margin-top: 0;
}

details.report-subsection {
  margin: 1rem 0 0;
  border: 1px solid var(--report-border);
  border-radius: var(--report-radius-md);
  background: #fbfdff;
}

details.report-subsection > summary {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  cursor: pointer;
  list-style: none;
  padding: 0.85rem 1rem;
}

details.report-subsection > summary .report-subsection-title {
  font-size: 1.08rem;
  line-height: 1.25;
  font-weight: 650;
  color: #193349;
}

details.report-subsection > .report-subsection-body {
  padding: 0 1rem 1rem 1rem;
}

details.report-subsection-level-3 {
  margin-left: 0.45rem;
  background: #fafdff;
  border-color: #dbe6f2;
}

details.report-subsection-level-3 > summary {
  padding: 0.78rem 0.9rem;
}

details.report-subsection-level-3 > summary .report-subsection-title {
  font-size: 1rem;
  color: #25415d;
}

details.report-subsection-level-3 > .report-subsection-body {
  padding: 0 0.9rem 0.9rem 0.9rem;
}

details.report-subsection-level-4 {
  margin-left: 0.8rem;
  background: #ffffff;
  border-color: #e2eaf3;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85);
}

details.report-subsection-level-4 > summary {
  padding: 0.72rem 0.85rem;
}

details.report-subsection-level-4 > summary .report-subsection-title {
  font-size: 0.96rem;
  color: #31506d;
}

details.report-subsection-level-4 > .report-subsection-body {
  padding: 0 0.85rem 0.85rem 0.85rem;
}

.report-loop-section {
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
}

.report-loop-section-level-2 {
  margin-top: 0.25rem;
}

.report-loop-section-level-3 {
  margin-top: 0.2rem;
  padding-left: 0.35rem;
}

details.report-item-panel {
  border: 1px solid var(--report-border);
  border-radius: var(--report-radius-md);
  background: linear-gradient(180deg, #ffffff, #f9fbfe);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85);
  overflow: hidden;
}

details.report-item-panel[open] {
  border-color: rgba(47, 111, 221, 0.22);
  box-shadow: 0 12px 26px rgba(30, 58, 92, 0.08);
}

details.report-item-panel > summary {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  cursor: pointer;
  list-style: none;
  padding: 0.8rem 0.95rem;
  background: linear-gradient(180deg, rgba(47, 111, 221, 0.04), rgba(255, 255, 255, 0.92));
}

details.report-item-panel-level-2 {
  background: linear-gradient(180deg, #ffffff, #f7fbff);
}

details.report-item-panel-level-2 > summary {
  background: linear-gradient(180deg, rgba(47, 111, 221, 0.06), rgba(255, 255, 255, 0.95));
}

details.report-item-panel-level-3 {
  margin-left: 0.3rem;
  border-color: #dbe5f0;
  background: linear-gradient(180deg, #ffffff, #fbfdff);
  box-shadow: none;
}

details.report-item-panel-level-3 > summary {
  padding: 0.72rem 0.85rem;
  background: linear-gradient(180deg, rgba(47, 111, 221, 0.035), rgba(255, 255, 255, 0.98));
}

details.report-item-panel > summary::-webkit-details-marker {
  display: none;
}

details.report-item-panel > summary::before {
  content: "\25B8";
  flex: 0 0 auto;
  width: 1.55rem;
  height: 1.55rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  background: rgba(47, 111, 221, 0.10);
  color: var(--report-accent-strong);
  font-size: 0.78rem;
  transition: transform 0.15s ease, background 0.15s ease;
}

details.report-item-panel[open] > summary::before {
  transform: rotate(90deg);
  background: rgba(47, 111, 221, 0.18);
}

details.report-item-panel > summary:focus {
  outline: 3px solid rgba(47, 111, 221, 0.2);
  outline-offset: -1px;
}

.report-item-panel-title {
  font-size: 0.98rem;
  line-height: 1.3;
  font-weight: 650;
  color: #193349;
}

details.report-item-panel-level-3 .report-item-panel-title {
  font-size: 1rem;
  font-weight: 620;
}

.report-item-panel-body {
  padding: 0.95rem;
}

details.report-item-panel-level-3 > .report-item-panel-body {
  padding: 0.8rem 0.85rem 0.85rem;
}

.report-item-panel-body > :first-child {
  margin-top: 0;
}

.report-item-note {
  margin: 0 0 0.9rem;
  color: var(--report-text-muted);
  font-size: 0.92rem;
}

.report-item-plot-card {
  overflow: hidden;
}

.report-item-plot-image {
  display: block;
  width: 100%;
  height: auto;
}

.report-item-table-wrap {
  margin-top: 0;
}

.report-asset-bar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.6rem;
  margin: 0 0 1rem;
  padding: 0.85rem 0.95rem;
  border: 1px solid var(--report-border);
  border-radius: var(--report-radius-md);
  background: linear-gradient(180deg, #ffffff, #f6faff);
}

.report-asset-label {
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: #55708d;
}

.report-asset-note {
  font-size: 0.82rem;
  color: var(--report-text-muted);
}

.report-inline-table-wrap {
  overflow-x: auto;
  margin: 1rem 0;
  border-radius: var(--report-radius-md);
  border: 1px solid var(--report-border);
  background: #ffffff;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
}

table {
  width: 100%;
  margin: 0;
  border-collapse: separate;
  border-spacing: 0;
  background: transparent;
}

thead th {
  position: sticky;
  top: 0;
  z-index: 1;
  padding: 0.82rem 0.9rem !important;
  border-bottom: 1px solid var(--report-border-strong) !important;
  background: #edf4fc;
  color: #284765;
  font-size: 0.82rem;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

tbody td {
  padding: 0.78rem 0.9rem !important;
  border-top: 1px solid #edf1f6;
  vertical-align: top;
}

tbody tr:nth-child(even) td {
  background: rgba(244, 248, 252, 0.6);
}

tbody tr:hover td {
  background: rgba(47, 111, 221, 0.05);
}

p,
ul,
ol {
  margin: 0 0 0.95rem;
}

img,
svg {
  max-width: 100%;
  height: auto;
}

.main-container p > img,
.main-container .report-plot-card {
  display: block;
  border-radius: var(--report-radius-md);
  border: 1px solid var(--report-border);
  background: #ffffff;
  box-shadow: var(--report-shadow-soft);
}

pre,
code {
  font-family: "JetBrains Mono", "SFMono-Regular", "Menlo", "Consolas", monospace;
}

pre {
  padding: 1rem 1.1rem;
  border-radius: var(--report-radius-md);
  border: 1px solid var(--report-border);
  background: #f8fbfe;
}

code {
  padding: 0.15rem 0.35rem;
  border-radius: 6px;
  background: rgba(47, 111, 221, 0.08);
  color: #163b63;
}

pre code {
  padding: 0;
  background: transparent;
}

a {
  color: var(--report-accent-strong);
}

a:hover,
a:focus {
  color: #173f73;
}

blockquote {
  margin: 1rem 0;
  padding: 0.85rem 1rem;
  border-left: 4px solid var(--report-accent);
  background: rgba(47, 111, 221, 0.06);
  color: #34516d;
}

.report-empty-state {
  padding: 1rem 1.1rem;
  border: 1px dashed var(--report-border-strong);
  border-radius: var(--report-radius-md);
  background: #fbfdff;
  color: var(--report-text-muted);
}

@media (max-width: 1220px) {
  .report-shell {
    padding: 0;
  }

  .report-sidebar {
    position: relative;
    left: auto;
    top: auto;
    bottom: auto;
    width: auto;
    max-height: none;
    min-height: 0;
    border-right: none;
    border-bottom: 1px solid var(--report-border);
  }

  .report-sidebar-nav-wrap {
    max-height: 320px;
  }

  .report-main-column {
    margin-left: 0;
    max-width: none;
    padding: 1rem;
    width: auto;
  }

  body.report-shell-ready .main-container {
    width: 100% !important;
  }

  .report-sidebar-resizer {
    display: none;
  }
}

@media (max-width: 780px) {
  .report-shell {
    gap: 1rem;
  }
